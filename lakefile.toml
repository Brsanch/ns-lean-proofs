name = "ns_blw_chain"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["NSBlwChain"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
diagnostics = true
"diagnostics.threshold" = 100

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "NSBlwChain"

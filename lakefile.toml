name = "ns_blw_chain"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["NSBlwChain"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

# Shared active-scalar infrastructure package (also required by sqg-lean-proofs).
# Supplies the domain-polymorphic `FourierAnalysis.exists_argmax_of_continuous_tendsto_zero`
# consumed in `NSBlwChain/BLW/SpatialArgmax.lean`.
[[require]]
name = "fourier_analysis"
git = "https://github.com/Brsanch/sqg-lean-proofs-fourier.git"
rev = "main"

[[lean_lib]]
name = "NSBlwChain"
